<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Centers, Again</title>
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #e8e8e8;
    --dim: #666;
    --accent: #f5f5f5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  /* use dynamic viewport units on mobile so the browser UI bar doesn't clip the stage */
  #stage { height: 100vh; height: 100dvh; }
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* video is mirrored so the user's movement feels natural */
  #video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    filter: grayscale(1) contrast(1.05) brightness(0.55);
  }
  #overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  /* ---- intro / permission screen ---- */
  #intro {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: calc(2rem + env(safe-area-inset-top)) 1.6rem calc(2rem + env(safe-area-inset-bottom));
    z-index: 10;
    transition: opacity 0.8s ease;
  }
  #intro h1 {
    font-weight: 300;
    font-size: clamp(1.8rem, 5vw, 3rem);
    letter-spacing: 0.04em;
    margin-bottom: 1.2rem;
  }
  #intro h1 em { font-style: italic; color: var(--dim); }
  #intro p {
    max-width: 30rem;
    line-height: 1.7;
    color: var(--dim);
    font-size: 0.95rem;
    margin-bottom: 0.6rem;
  }
  #start {
    margin-top: 2.2rem;
    background: none;
    border: 1px solid var(--dim);
    color: var(--fg);
    padding: 1rem 2.6rem;
    font-size: 1.05rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.25s ease;
    touch-action: manipulation;
  }
  #start:active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
  @media (hover: hover) {
    #start:hover { background: var(--fg); color: var(--bg); border-color: var(--fg); }
  }
  .fade-out { opacity: 0; pointer-events: none; }

  #status {
    position: absolute;
    top: calc(1.2rem + env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    width: max-content;
    max-width: 90vw;
    font-size: 0.8rem;
    color: var(--dim);
    letter-spacing: 0.08em;
    z-index: 5;
    text-align: center;
  }
</style>
</head>
<body>
<div id="stage">
  <video id="video" playsinline muted></video>
  <canvas id="overlay"></canvas>

  <div id="status"></div>

  <div id="intro">
    <h1>Centers, <em>Again</em></h1>
    <p>손을 들어 화면 중앙 — 렌즈의 원점을 겨누세요.</p>
    <p>중심에 가까울수록 소리는 하나의 순음으로 맑아지고,</p>
    <p>멈출 수 없는 떨림이 그 위로 새어 나옵니다.</p>
    <p style="margin-top:1.4rem; color:#444; font-size:0.8rem;">웹캠 영상은 이 기기에서만 처리되며 어디에도 저장되지 않습니다.</p>
    <button id="start">시작하기</button>
  </div>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video   = document.getElementById("video");
const canvas  = document.getElementById("overlay");
const ctx     = canvas.getContext("2d");
const intro   = document.getElementById("intro");
const startBtn= document.getElementById("start");
const statusEl= document.getElementById("status");

// ---------- config ----------
const CENTER_FREQ = 220;        // the single origin tone (Hz) — one center for everyone
const MAX_HARMONIC_GAIN = 0.35; // loudness of the "reference" tone that beats against the fundamental
const TREMOR_PITCH_DEPTH = 90;  // cents of pitch wobble at full tremor
const MAX_DETUNE_CENTS = 120;   // how far the reference tone drifts out of tune at the edge
const CONVERGE_POWER = 3;       // >1 makes the "in tune" zone snap tighter near the very center

// --- dwell: reaching the center is not an end but a beginning ---
const DWELL_ZONE = 0.14;        // how close (dist) you must be for dwell to accumulate
const DWELL_RISE = 0.35;        // how fast dwell fills per second while held at center
const DWELL_FALL = 0.9;         // how fast dwell drains per second once you leave / tremble
const TREMOR_PENALTY = 6.0;     // how strongly tremble eats into dwell accumulation

// --- living origin: "here" is never a fixed fact, it is re-computed every frame ---
// The point you aim at is itself in motion, so it can never be reached — not because
// your hand shakes, but because the center was never still to begin with.
const ORIGIN_DRIFT = 0.010;     // amplitude of the origin's wander (in normalized 0..1 units)
const ORIGIN_SPEED = 0.7;       // how quickly the origin re-computes its position
const ORIGIN_JITTER = 0.0016;   // per-frame micro-reconstruction — the last, irreducible gap
// ----------------------------

let landmarker = null;
let audioCtx = null;
let running = false;
let dwell = 0;                  // 0..1 — the accumulated "staying", the subject of the piece
let lastFrameTime = null;

// living origin state — the smooth wander plus an irreducible per-frame jitter
let originX = 0.5, originY = 0.5;      // current re-computed "here", in normalized coords
let originPhaseA = Math.random() * 6.28, originPhaseB = Math.random() * 6.28;

// The origin never rests. A slow drift (it re-forms its position continuously) plus a
// per-frame jitter (each measurement returns a slightly different value) means the very
// point you aim at is an approximation being rewritten, not a fact being found.
function updateOrigin(nowSec) {
  originPhaseA += ORIGIN_SPEED * 0.016;
  originPhaseB += ORIGIN_SPEED * 0.016 * 1.37; // incommensurate → never repeats cleanly
  const driftX = Math.sin(originPhaseA) * 0.6 + Math.sin(originPhaseB * 0.7) * 0.4;
  const driftY = Math.cos(originPhaseB) * 0.6 + Math.cos(originPhaseA * 0.9) * 0.4;
  const jx = (Math.random() - 0.5) * 2 * ORIGIN_JITTER;
  const jy = (Math.random() - 0.5) * 2 * ORIGIN_JITTER;
  originX = 0.5 + driftX * ORIGIN_DRIFT + jx;
  originY = 0.5 + driftY * ORIGIN_DRIFT + jy;
}

// audio nodes
let osc, refOsc, refGain, masterGain, pitchParam, refDetune;
let growGains = [], growOscs = [], reverbGain, dryGain;

function setupAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // fundamental sine — the pure tone
  osc = audioCtx.createOscillator();
  osc.type = "sine";
  osc.frequency.value = CENTER_FREQ;

  // a SECOND sine at the same pitch — the "reference" you tune against.
  // Off-center it is detuned and beats against the fundamental (wah-wah).
  // At the center the detune goes to 0 and the two lock into one clean tone.
  refOsc = audioCtx.createOscillator();
  refOsc.type = "sine";
  refOsc.frequency.value = CENTER_FREQ;

  refGain = audioCtx.createGain();
  refGain.gain.value = 0;

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0; // silent until a hand appears

  // reverb — a space that opens as dwell grows
  const convolver = audioCtx.createConvolver();
  convolver.buffer = makeImpulse(2.6, 2.4);
  reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0;      // closed until dwell opens it
  dryGain = audioCtx.createGain();
  dryGain.gain.value = 1;

  masterGain.connect(dryGain).connect(audioCtx.destination);
  masterGain.connect(convolver).connect(reverbGain).connect(audioCtx.destination);

  osc.connect(masterGain);
  refOsc.connect(refGain).connect(masterGain);

  // growth partials — harmonics that are born one by one as you stay.
  // Reaching the center opens a chord that wasn't there before.
  const ratios = [1.5, 2.0, 3.0]; // fifth, octave, octave+fifth
  ratios.forEach((r) => {
    const o = audioCtx.createOscillator();
    o.type = "sine";
    o.frequency.value = CENTER_FREQ * r;
    const g = audioCtx.createGain();
    g.gain.value = 0;
    o.connect(g).connect(masterGain);
    o.start();
    growOscs.push(o);
    growGains.push(g);
  });

  osc.start();
  refOsc.start();
  pitchParam = osc.frequency;
  refDetune = refOsc.detune; // in cents
}

// simple decaying-noise impulse response for the convolver
function makeImpulse(seconds, decay) {
  const rate = audioCtx.sampleRate;
  const len = Math.floor(rate * seconds);
  const buf = audioCtx.createBuffer(2, len, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
  }
  return buf;
}

async function setupHands() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  const modelPath =
    "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task";
  try {
    landmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: modelPath, delegate: "GPU" },
      runningMode: "VIDEO",
      numHands: 1
    });
  } catch (e) {
    // some mobile browsers lack GPU delegate support — fall back to CPU
    console.warn("GPU delegate failed, falling back to CPU", e);
    landmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: modelPath, delegate: "CPU" },
      runningMode: "VIDEO",
      numHands: 1
    });
  }
}

async function startCamera() {
  // ideal resolution; browser will pick closest. Front camera by default.
  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "user",
      width:  { ideal: 1280 },
      height: { ideal: 720 }
    },
    audio: false
  });
  video.srcObject = stream;
  // wait until dimensions are known before playing (iOS Safari)
  await new Promise((res) => {
    if (video.readyState >= 1) return res();
    video.onloadedmetadata = () => res();
  });
  await video.play();
}

function resize() {
  // account for device pixel ratio so lines stay crisp on retina/mobile
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = window.innerWidth;
  const h = window.innerHeight;
  canvas.width  = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width  = w + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", () => setTimeout(resize, 200));

// smoothing state for tremor
let lastX = null, lastY = null;
let tremor = 0;

let lastVideoTime = -1;
let lastResult = null;

function loop() {
  if (!running) return;

  // only run detection on a fresh video frame with valid dimensions
  let result = lastResult;
  if (video.readyState >= 2 && video.videoWidth > 0 && video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    try {
      result = landmarker.detectForVideo(video, performance.now());
      lastResult = result;
    } catch (e) {
      result = lastResult;
    }
  }
  if (!result) { requestAnimationFrame(loop); return; }

  // logical (CSS pixel) size — ctx is already scaled by DPR
  const W = window.innerWidth;
  const H = window.innerHeight;
  ctx.clearRect(0, 0, W, H);

  // time delta for frame-rate-independent dwell
  const nowSec = performance.now() / 1000;
  const dt = lastFrameTime === null ? 0.016 : Math.min(0.1, nowSec - lastFrameTime);
  lastFrameTime = nowSec;

  // the origin re-computes itself every frame — "here" is never the same point twice
  updateOrigin(nowSec);
  const cx = originX * W;
  const cy = originY * H;

  if (result.landmarks && result.landmarks.length > 0) {
    // index fingertip = landmark 8
    const tip = result.landmarks[0][8];
    // video is mirrored on screen, so mirror x to match what the user sees
    const nx = 1 - tip.x;
    const ny = tip.y;
    const px = nx * W;
    const py = ny * H;

    // distance from the LIVING origin, normalized 0..~1
    const dx = nx - originX;
    const dy = ny - originY;
    const dist = Math.min(1, Math.hypot(dx, dy) * 2);

    // tremor = frame-to-frame movement of the fingertip
    if (lastX !== null) {
      const v = Math.hypot(nx - lastX, ny - lastY);
      // short smoothing window; keep the jitter alive
      tremor = tremor * 0.7 + v * 0.3;
    }
    lastX = nx; lastY = ny;

    // --- DWELL: staying at the center grows something; you cannot stay still ---
    if (dist < DWELL_ZONE) {
      // inside the zone: fill, but tremble eats the gain, so a shaking hand
      // barely accumulates. Perfect stillness (impossible) would fill fastest.
      const stillness = Math.max(0, 1 - tremor * TREMOR_PENALTY);
      dwell += DWELL_RISE * stillness * dt;
    } else {
      dwell -= DWELL_FALL * dt; // left the center: it drains back
    }
    dwell = Math.max(0, Math.min(1, dwell));

    updateSound(dist, tremor, dwell);
    drawSpread(cx, cy, dwell, tremor, nowSec);
    drawOrigin(cx, cy, dwell, tremor);
    drawHand(px, py, cx, cy, dist);
    statusEl.textContent = "";
  } else {
    // no hand: fade to silence, dwell drains away
    if (masterGain) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.08);
    lastX = lastY = null;
    tremor = 0;
    dwell = Math.max(0, dwell - DWELL_FALL * dt);
    drawSpread(cx, cy, dwell, 0, nowSec);
    drawOrigin(cx, cy, dwell, 0);
    statusEl.textContent = "손을 들어 중심을 겨누세요";
  }

  requestAnimationFrame(loop);
}

function updateSound(dist, tremorVal, dwellVal) {
  const t = audioCtx.currentTime;
  // hand present -> audible
  masterGain.gain.setTargetAtTime(0.22, t, 0.05);

  // --- TUNER LOGIC ---
  // "closeness" is 1 at the exact center, 0 at the edge.
  // CONVERGE_POWER sharpens the payoff: the tone only truly locks in
  // the last little bit of the way to the center.
  const closeness = Math.pow(1 - dist, CONVERGE_POWER);

  // reference tone detune: far away = out of tune (beats), center = 0 (locked).
  const detune = (1 - closeness) * MAX_DETUNE_CENTS;
  refDetune.setTargetAtTime(detune, t, 0.05);

  // the reference tone is loud while off-center (strong beating) and fades
  // to near-silence at the center, so the lock into one clean tone is obvious.
  const refLevel = MAX_HARMONIC_GAIN * (1 - closeness);
  refGain.gain.setTargetAtTime(refLevel, t, 0.05);

  // tremor -> pitch wobble in cents. Purer tone at center makes it stand out.
  const cents = Math.min(1, tremorVal * 40) * TREMOR_PITCH_DEPTH;
  const wobble = CENTER_FREQ * Math.pow(2, cents / 1200);
  pitchParam.setTargetAtTime(wobble, t, 0.02);
  // reference tracks the same fundamental; its detune offset does the tuning work
  refOsc.frequency.setTargetAtTime(wobble, t, 0.02);

  // --- GROWTH: dwell opens a chord and a space that weren't there before ---
  // each partial is born in turn as dwell crosses successive thirds.
  growGains.forEach((g, i) => {
    const threshold = i / growGains.length;           // 0, .33, .66
    const local = Math.max(0, (dwellVal - threshold) * growGains.length);
    const level = Math.min(1, local) * 0.16;
    g.gain.setTargetAtTime(level, t, 0.15);
    // partials also inherit the tremor wobble, so growth never fully stabilizes
    growOscs[i].frequency.setTargetAtTime(wobble * [1.5, 2.0, 3.0][i], t, 0.05);
  });

  // reverb space opens with dwell; the dry signal steps back a little
  reverbGain.gain.setTargetAtTime(dwellVal * 0.9, t, 0.2);
  dryGain.gain.setTargetAtTime(1 - dwellVal * 0.25, t, 0.2);
}

// ---------- drawing ----------
function drawOrigin(cx, cy, dwellVal, tremorVal) {
  // cx, cy already carry the living origin's own motion (computed in updateOrigin).
  // The center is not perturbed by the hand — it was never still on its own.
  const ox = cx;
  const oy = cy;

  const glow = 0.35 + dwellVal * 0.5;
  ctx.strokeStyle = `rgba(220,220,220,${glow})`;
  ctx.lineWidth = 1;
  // crosshair
  ctx.beginPath();
  ctx.moveTo(ox - 14, oy); ctx.lineTo(ox - 4, oy);
  ctx.moveTo(ox + 4, oy); ctx.lineTo(ox + 14, oy);
  ctx.moveTo(ox, oy - 14); ctx.lineTo(ox, oy - 4);
  ctx.moveTo(ox, oy + 4); ctx.lineTo(ox, oy + 14);
  ctx.stroke();

  const pulse = 6 + dwellVal * 10;
  ctx.beginPath();
  ctx.arc(ox, oy, pulse, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(240,240,240,${0.5 + dwellVal * 0.4})`;
  ctx.fill();
}

// concentric waves that spread from the center as dwell grows.
// tremor perturbs the rings so the spreading never becomes calm.
function drawSpread(cx, cy, dwellVal, tremorVal, nowSec) {
  if (dwellVal <= 0.001) return;
  const W = window.innerWidth, H = window.innerHeight;
  const maxR = Math.hypot(W, H) * 0.5;

  // soft radial wash of light that grows with dwell
  const wash = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR * (0.3 + dwellVal * 0.9));
  wash.addColorStop(0, `rgba(255,255,255,${dwellVal * 0.10})`);
  wash.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = wash;
  ctx.fillRect(0, 0, W, H);

  // expanding rings — number and reach grow with dwell
  const rings = Math.floor(2 + dwellVal * 5);
  for (let i = 0; i < rings; i++) {
    const phase = (nowSec * 0.25 + i / rings) % 1;
    const r = phase * maxR * (0.25 + dwellVal * 0.9);
    const wobble = 1 + Math.sin(nowSec * 8 + i) * tremorVal * 4; // tremble distorts the ring
    const alpha = (1 - phase) * dwellVal * 0.4;
    ctx.beginPath();
    ctx.arc(cx, cy, r * wobble, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(235,235,235,${alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function drawHand(px, py, cx, cy, dist) {
  const closeness = 1 - dist;

  // fingertip marker — converges (shrinks, brightens) near center
  const r = 10 - closeness * 5;
  ctx.beginPath();
  ctx.arc(px, py, r, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(245,245,245,${0.4 + closeness * 0.6})`;
  ctx.fill();
}

// ---------- controls ----------
// no HUD, no toggle — the tremble is shown, not numbered.

startBtn.addEventListener("click", async () => {
  startBtn.disabled = true;
  startBtn.textContent = "불러오는 중…";
  try {
    resize();
    setupAudio();
    // iOS unlock: play a silent buffer inside the user gesture
    const buf = audioCtx.createBuffer(1, 1, 22050);
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
    if (audioCtx.state === "suspended") await audioCtx.resume();
    await setupHands();
    await startCamera();
    running = true;
    intro.classList.add("fade-out");
    statusEl.textContent = "손을 들어 중심을 겨누세요";
    loop();
  } catch (err) {
    console.error(err);
    startBtn.disabled = false;
    startBtn.textContent = "다시 시도";
    let msg = "오류가 발생했습니다.";
    if (err && err.name === "NotAllowedError")
      msg = "카메라 권한이 필요합니다. 브라우저 설정에서 허용해 주세요.";
    else if (err && err.name === "NotFoundError")
      msg = "웹캠을 찾을 수 없습니다.";
    intro.querySelectorAll("p")[0].textContent = msg;
  }
});
</script>
</body>
</html>
